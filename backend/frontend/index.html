<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>创世日记引擎</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0f0f0f; color: #e0e0e0; min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    padding: 24px 32px; border-bottom: 1px solid #2a2a4a;
  }
  .header h1 { font-size: 22px; font-weight: 600; color: #e0c080; }
  .header p { font-size: 13px; color: #888; margin-top: 4px; }
  .container { display: flex; gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }
  .panel {
    background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 8px;
    padding: 20px; display: flex; flex-direction: column;
  }
  .panel-left { flex: 1; min-width: 380px; }
  .panel-right { flex: 1.5; min-width: 480px; }
  .panel h2 { font-size: 14px; color: #e0c080; margin-bottom: 10px; font-weight: 500; }
  .panel .sub { font-size: 11px; color: #666; margin-bottom: 6px; }
  textarea {
    width: 100%; background: #111; border: 1px solid #333;
    border-radius: 4px; color: #e0e0e0; padding: 10px; font-size: 13px;
    font-family: inherit; resize: vertical; outline: none;
  }
  textarea:focus { border-color: #e0c080; }
  textarea#world { height: 150px; }
  textarea#chars { height: 120px; }
  textarea#direction { height: 50px; }
  .input-group { margin-bottom: 12px; }
  .row { display: flex; gap: 12px; align-items: center; margin: 12px 0; }
  .row label { font-size: 13px; color: #aaa; white-space: nowrap; }
  .row input[type="range"] { flex: 1; accent-color: #e0c080; }
  .row .val { color: #e0c080; font-size: 14px; min-width: 20px; text-align: center; }
  .btn {
    background: #e0c080; color: #111; border: none; border-radius: 4px;
    padding: 10px 24px; font-size: 14px; font-weight: 600; cursor: pointer;
    transition: opacity .2s; width: 100%;
  }
  .btn:hover { opacity: .85; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-secondary {
    background: #2a2a2a; color: #ccc; border: 1px solid #444;
    border-radius: 4px; padding: 6px 14px; font-size: 12px; cursor: pointer;
    transition: background .15s;
  }
  .btn-secondary:hover { background: #3a3a3a; }
  .btn-secondary.active { background: #3a3a2a; border-color: #e0c080; color: #e0c080; }
  .status {
    margin-top: 10px; padding: 8px 12px; border-radius: 4px;
    font-size: 13px; display: none;
  }
  .status.loading { display: block; background: #1a2a1a; color: #8c8; border: 1px solid #2a4a2a; }
  .status.error { display: block; background: #2a1a1a; color: #c88; border: 1px solid #4a2a2a; }
  .output-area { flex: 1; min-height: 300px; overflow-y: auto; }
  .chapter {
    background: #111; border: 1px solid #2a2a2a; border-radius: 6px;
    padding: 16px; margin-bottom: 12px;
  }
  .chapter h3 { font-size: 14px; color: #e0c080; margin-bottom: 8px; }
  .chapter .meta { font-size: 12px; color: #666; margin-bottom: 8px; }
  .chapter .meta .pass { color: #4a4; }
  .chapter .meta .fail { color: #c44; }
  .chapter .text { font-size: 14px; line-height: 1.8; color: #ccc; white-space: pre-wrap; }
  .empty-state {
    display: flex; align-items: center; justify-content: center;
    height: 200px; color: #555; font-size: 14px; text-align: center;
  }
  .toolbar { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .toolbar .hint { font-size: 11px; color: #555; align-self: center; }
  .demo-label { font-size: 11px; color: #666; margin-right: 4px; align-self: center; }
.chart-container{background:#111;border:1px solid #2a2a2a;border-radius:6px;padding:12px;margin-top:12px;display:none}.chart-container canvas{width:100%;height:100px;display:block}.quality-bar{display:flex;gap:4px;margin:8px 0;align-items:center}.quality-bar .label{font-size:11px;color:#666;min-width:60px}.quality-bar .track{flex:1;height:6px;background:#222;border-radius:3px;overflow:hidden}.quality-bar .fill{height:100%;border-radius:3px;transition:width .3s}.quality-bar .fill.good{background:linear-gradient(90deg,#4a4,#8c8)}.quality-bar .fill.ok{background:linear-gradient(90deg,#ca4,#ec8)}.quality-bar .fill.bad{background:linear-gradient(90deg,#c44,#e88)}.animate-in{animation:fadeIn .3s ease}@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .btn-icon { background:none; border:1px solid #444; color:#ccc; border-radius:4px; padding:4px 10px; cursor:pointer; font-size:16px; }
  .btn-icon:hover { background:#333; color:#e0c080; }
  .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:100; display:flex; align-items:center; justify-content:center; }
  .modal-content { background:#1a1a1a; border:1px solid #333; border-radius:8px; padding:20px; width:400px; max-height:80vh; overflow-y:auto; }
  .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
  .modal-header h2 { font-size:16px; color:#e0c080; margin:0; }
  .modal-input { width:100%; background:#111; border:1px solid #333; border-radius:4px; color:#e0e0e0; padding:8px; font-size:13px; margin-bottom:10px; outline:none; }
  .modal-input:focus { border-color:#e0c080; }
  .modal label { font-size:12px; color:#888; display:block; margin-bottom:4px; }
  .progress-bar { background:#111; border:1px solid #2a2a2a; border-radius:4px; height:24px; margin:10px 0; position:relative; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,#e0c080,#d4a060); transition:width .5s; border-radius:4px; }
  .progress-text { position:absolute; top:0; left:0; right:0; text-align:center; line-height:24px; font-size:12px; color:#111; font-weight:600; }
  .chapter-actions { display:flex; gap:6px; margin:8px 0; }
  .chapter-actions .btn-small { background:#2a2a2a; color:#ccc; border:1px solid #444; border-radius:3px; padding:3px 8px; font-size:11px; cursor:pointer; }
  .chapter-actions .btn-small:hover { background:#3a3a3a; }
  .feedback-input { width:100%; background:#111; border:1px solid #333; border-radius:4px; color:#e0e0e0; padding:6px; font-size:12px; margin:4px 0; outline:none; }
</style>
</head>
<body>
<div class="header">
  <div style="display:flex;align-items:center;justify-content:space-between">
    <div>
      <h1>Novel World Engine</h1>
      <p>让角色在模拟的世界中书写自己的故事</p>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-icon" onclick="showSettings()" title="LLM 配置">&#9881;</button>
      <button class="btn-icon" onclick="showRelationGraph()" title="关系网络">&#9671;</button>
    </div>
  </div>
</div>

<div class="container">
  <!-- 左侧：设置面板 -->
  <div class="panel panel-left">
    <div class="toolbar">
      <span class="demo-label">示例:</span>
      <button class="btn-secondary active" onclick="loadDemo('xianxia')">🏯 修仙</button>
      <button class="btn-secondary" onclick="loadDemo('urban')">🏙️ 都市</button>
      <button class="btn-secondary" onclick="loadDemo('fantasy')">🧙 西幻</button>
      <span class="hint" style="margin-left:auto;">LLM API 需在 .env 中配置</span>
    </div>

    <div class="input-group">
      <h2>世界观设定</h2>
      <div class="sub">地点 · 势力 · 规则 · 历史 · 修炼体系</div>
      <textarea id="world" placeholder="描述你的世界...&#10;&#10;可以写: 地点、势力、世界规则、历史背景、修炼体系、当前局势&#10;&#10;例如:&#10;苍澜学院武道世界。&#10;地点: 演武场、藏书阁、后山禁地。&#10;修炼体系: 炼体→凝气→筑基→金丹。&#10;势力: 赵家是苍澜城大族，行事霸道。"></textarea>
    </div>

    <div class="input-group">
      <h2>角色设定</h2>
      <div class="sub">每行一个 · 姓名, 年龄, 身份, 性格, 动机, 秘密</div>
      <textarea id="chars" placeholder="每行一个角色。可以写: 姓名, 年龄, 身份, 性格, 动机, 秘密&#10;&#10;例如:&#10;林北辰, 16岁, 外门弟子, 沉默寡言但意志坚定, 一心要为家族复仇&#10;赵无极, 18岁, 内门弟子, 嚣张跋扈, 赵家嫡子, 好大喜功"></textarea>
    </div>

    <div class="input-group">
      <h2>故事方向 <span style="color:#555;font-weight:400;font-size:12px;">(可选)</span></h2>
      <div class="sub">你想要的故事走向，PlotDirector 据此规划章节</div>
      <textarea id="direction" placeholder="例如: 扮猪吃老虎 / 逆袭打脸 / 悬疑探索 / 热血成长 / 悬疑解密 / 友情羁绊&#10;&#10;空着也行，引擎会根据世界观和角色自己判断"></textarea>
    </div>

    <div class="row">
      <label>章节数</label>
      <input type="range" id="chapters" min="1" max="5" value="3">
      <span class="val" id="chaptersVal">3</span>
      <label style="margin-left:12px;">精细度</label>
      <input type="range" id="beats" min="1" max="5" value="3">
      <span class="val" id="beatsVal">3</span>
    </div>

    <button class="btn" id="runBtn" onclick="runWithProgress()">开始模拟</button>
    <div class="status" id="status"></div>

    <div class="toolbar" style="margin-top:10px;">
      <button class="btn-secondary" onclick="clearAll()">清空</button>
    </div>
  </div>

  <!-- 右侧：输出面板 -->
  <div class="panel panel-right">
    <h2>故事输出</h2>
    <div class="chart-container" id="chartContainer"><canvas id="tensionChart"></canvas></div>
    <div class="output-area" id="output">
      <div class="empty-state">点击"开始模拟"生成故事</div>
    </div>
  </div>
</div>

<script>
const DEMOS = {
  xianxia: {
    world: `苍澜学院武道世界。
地点:
- 演武场: 学生日常训练和比试的广场
- 藏书阁: 珍藏功法典籍的阁楼
- 后山禁地: 隐藏着上古秘宝的神秘区域
修炼体系: 炼体→凝气→筑基→金丹 (每境分九层)
灵根: 天地玄黄四等，黄级最差
势力:
- 赵家: 苍澜城大族，势力庞大，行事霸道
- 苍澜学院: 中立武道学府，不问出身`,
    chars: `林北辰, 16岁, 外门弟子, 黄级灵根, 沉默寡言但意志坚定, 身负家族血仇
赵无极, 18岁, 内门弟子, 地级灵根, 嚣张跋扈, 赵家嫡子, 好大喜功
苏晚晴, 17岁, 内门天才, 地级灵根, 表面高傲内心善良, 与林北辰似有宿缘`,
    direction: "扮猪吃老虎, 逆袭打脸, 从最底层一步步证明自己"
  },
  urban: {
    world: `现代都市异能世界。
地点:
- 江城大学: 全国重点大学，表面平静
- 地下格斗场: 异能者暗中较量的地方
- 天华集团: 掌控城市经济命脉的庞然大物
设定:
- 异能觉醒: 少数人在成年后觉醒特殊能力
- 灵能等级: F→E→D→C→B→A→S
- 异能者管理: 国家设有异能管理局，暗中监管`,
    chars: `陈默, 19岁, 江城大学学生, F级念动力, 性格低调但内心骄傲, 父母失踪成谜
赵天龙, 21岁, 天华集团继承人, C级强化系异能, 嚣张跋扈, 追求校花柳如烟
柳如烟, 20岁, 江城大学校花, B级心灵感应, 表面温柔实则有自己的计划`,
    direction: "都市异能, 从底层崛起, 揭露真相, 热血战斗"
  },
  fantasy: {
    world: `光明大陆西幻世界。
地点:
- 圣光城: 光明教廷所在地，大陆信仰中心
- 暗影沼泽: 黑暗生物盘踞的禁区
- 龙脊山脉: 巨龙沉睡之地，藏有无尽财宝
势力:
- 光明教廷: 统治西方大陆的神权组织，表面光鲜
- 暗影议会: 被镇压数百年，暗中积蓄力量
- 龙族: 超然物外，极少干涉凡间事务`,
    chars: `亚瑟, 18岁, 见习骑士, 正义感极强但过于天真, 父母在龙脊山脉失踪
莫甘娜, 年龄不详, 神秘女法师, 行事亦正亦邪, 似乎在寻找某样东西
雷克斯, 35岁, 暗影议会刺客大师, 冷酷无情, 但对弱小者有一丝恻隐之心`,
    direction: "光明与黑暗的较量, 真相远非表面那么简单"
  }
};

document.getElementById('chapters').addEventListener('input', e => {
  document.getElementById('chaptersVal').textContent = e.target.value;
});
document.getElementById('beats').addEventListener('input', e => {
  document.getElementById('beatsVal').textContent = e.target.value;
});

function loadDemo(type) {
  const demo = DEMOS[type];
  if (!demo) return;
  document.getElementById('world').value = demo.world;
  document.getElementById('chars').value = demo.chars;
  document.getElementById('direction').value = demo.direction || '';
  // 高亮当前示例按钮
  document.querySelectorAll('.demo-label ~ .btn-secondary').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
}

function clearAll() {
  document.getElementById('world').value = '';
  document.getElementById('chars').value = '';
  document.getElementById('direction').value = '';
  document.getElementById('output').innerHTML = '<div class="empty-state">点击"开始模拟"生成故事</div>';
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + type;
}

function drawTensionChart(scores) {
  var c = document.getElementById('tensionChart');
  var ct = document.getElementById('chartContainer');
  if (!scores || scores.length < 2) return;
  ct.style.display = 'block';
  var ctx = c.getContext('2d');
  c.width = ct.offsetWidth; c.height = 120;
  var w = c.width, h = c.height, p = {l:30,r:10,t:10,b:20};
  var cw = w - p.l - p.r, ch = h - p.t - p.b;
  ctx.clearRect(0,0,w,h);
  ctx.strokeStyle='#222'; ctx.lineWidth=0.5;
  for(var i=0;i<=4;i++){ ctx.beginPath(); ctx.moveTo(p.l,p.t+i*ch/4); ctx.lineTo(w-p.r,p.t+i*ch/4); ctx.stroke(); }
  if(scores.length<2) return;
  ctx.beginPath(); ctx.strokeStyle='#e0c080'; ctx.lineWidth=2;
  scores.forEach(function(s,i){var x=p.l+i/(scores.length-1)*cw,y=p.t+(1-s/80)*ch;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.stroke();
  ctx.setLineDash([4,4]); ctx.strokeStyle='#4a48'; ctx.lineWidth=1;
  var py = p.t+(1-48/80)*ch; ctx.beginPath(); ctx.moveTo(p.l,py); ctx.lineTo(w-p.r,py); ctx.stroke();
  ctx.setLineDash([]); ctx.fillStyle='#4a4'; ctx.font='9px sans-serif'; ctx.fillText('48',w-p.r-18,py-2);
  scores.forEach(function(s,i){var x=p.l+i/(scores.length-1)*cw,y=p.t+(1-s/80)*ch;
    ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fillStyle=s>=48?'#4a4':'#c44'; ctx.fill();
    ctx.fillStyle='#888'; ctx.font='10px sans-serif'; ctx.textAlign='center'; ctx.fillText(s,x,y-8); });
}

async function run() {
  const btn = document.getElementById('runBtn');
  const world = document.getElementById('world').value.trim();
  const charsText = document.getElementById('chars').value.trim();
  const direction = document.getElementById('direction').value.trim();
  const chapters = parseInt(document.getElementById('chapters').value);
  const beats = parseInt(document.getElementById('beats').value);

  if (!world) { setStatus('请输入世界观设定', 'error'); return; }
  const chars = charsText.split('\n').map(s => s.trim()).filter(Boolean);
  if (chars.length < 2) { setStatus('至少需要 2 个角色', 'error'); return; }

  btn.disabled = true;
  setStatus('模拟进行中... (每章约需 1-3 分钟)', 'loading');
  document.getElementById('output').innerHTML = '<div class="empty-state">⏳ 生成中...</div>';

  try {
    const body = { world, chars, chapters, beats };
    if (direction) body.direction = direction;
    
    const res = await fetch('/api/simulate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || '请求失败');

    let html = '';
    data.chapters.forEach(ch => {
      const mark = ch.quality_passed ? '<span class="pass">✅ 通过</span>' : '<span class="fail">❌ 未通过</span>';
      // 质量条
    let avgQ = Math.round(data.quality_scores.reduce((a,b)=>a+b,0)/data.quality_scores.length);
    let qClass = avgQ >= 60 ? 'good' : (avgQ >= 48 ? 'ok' : 'bad');
    html += '<div class="quality-bar"><span class="label">平均质量</span>';
    html += '<div class="track"><div class="fill ' + qClass + '" style="width:' + (avgQ/80*100) + '%"></div></div>';
    html += '<span style="font-size:11px;color:#888;">' + avgQ + '/80</span></div>';
    html += '<div class="chapter">
        <h3>第 ${ch.number} 章</h3>
        <div class="meta">${ch.word_count} 字 | 质量评分 ${ch.quality}/80 ${mark}</div>
        <div class="text">${ch.text}</div>
      </div>`;
    });
    html += `<div style="text-align:center;color:#666;font-size:13px;padding:8px;">
      共 ${data.total_words} 字 | 平均质量 ${Math.round(data.quality_scores.reduce((a,b)=>a+b,0)/data.quality_scores.length)}/80;drawTensionChart(data.quality_scores)
    </div>`;
    document.getElementById('output').innerHTML = html;
    setStatus('', '');
  } catch (e) {
    setStatus('❌ ' + e.message, 'error');
    document.getElementById('output').innerHTML = '<div class="empty-state">模拟失败，请检查控制台</div>';
  } finally {
    btn.disabled = false;
  }
}

// ─── LLM 配置 ────────────────────────────────────────────
function showSettings() {
  document.getElementById('settingsModal').style.display = 'flex';
  loadLLMConfig();
}
function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
async function loadLLMConfig() {
  try {
    const r = await fetch('/api/llm-config');
    const d = await r.json();
    document.getElementById('cfgBaseUrl').value = d.base_url || '';
    document.getElementById('cfgModel').value = d.model || '';
    document.getElementById('cfgTemp').value = d.temperature || 0.7;
    document.getElementById('cfgStatus').textContent = d.has_key ? '已配置 API Key' : '未配置 API Key';
  } catch(e) { document.getElementById('cfgStatus').textContent = '加载失败'; }
}
async function saveLLMConfig() {
  const body = {
    api_key: document.getElementById('cfgApiKey').value,
    base_url: document.getElementById('cfgBaseUrl').value,
    model: document.getElementById('cfgModel').value,
    temperature: parseFloat(document.getElementById('cfgTemp').value),
  };
  try {
    const r = await fetch('/api/llm-config', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const d = await r.json();
    document.getElementById('cfgStatus').textContent = d.success ? '已保存' : d.message;
  } catch(e) { document.getElementById('cfgStatus').textContent = '保存失败'; }
}
async function testLLMConfig() {
  document.getElementById('cfgStatus').textContent = '测试中...';
  try {
    const r = await fetch('/api/llm-config/test');
    const d = await r.json();
    document.getElementById('cfgStatus').textContent = d.success ? '连接成功: ' + d.response : '失败: ' + d.error;
  } catch(e) { document.getElementById('cfgStatus').textContent = '测试失败: ' + e.message; }
}

// ─── 关系网络图 ──────────────────────────────────────────
function showRelationGraph() {
  document.getElementById('relationModal').style.display = 'flex';
  drawRelationGraph();
}
function closeRelation() { document.getElementById('relationModal').style.display = 'none'; }
function drawRelationGraph() {
  const charsText = document.getElementById('chars').value.trim();
  const chars = charsText.split('\n').map(s => s.trim()).filter(Boolean);
  if (chars.length < 2) return;
  // 简单力导向图
  const canvas = document.getElementById('relationCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,560,400);
  const cx=280, cy=200, r=150;
  const angleStep = 2*Math.PI/chars.length;
  const positions = chars.map((name,i) => ({
    x: cx + r*Math.cos(i*angleStep - Math.PI/2),
    y: cy + r*Math.sin(i*angleStep - Math.PI/2),
    name: name.split(',')[0] || name
  }));
  // 边
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
  positions.forEach((a,i) => {
    positions.forEach((b,j) => {
      if(i<j) { ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }
    });
  });
  // 节点
  positions.forEach(p => {
    ctx.beginPath(); ctx.arc(p.x,p.y,20,0,2*Math.PI);
    ctx.fillStyle = '#2a2a4a'; ctx.fill();
    ctx.strokeStyle = '#e0c080'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#e0e0e0'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(p.name, p.x, p.y+4);
  });
}

// ─── 单章重写 ────────────────────────────────────────────
async function rewriteChapter(chNum) {
  const fb = document.getElementById('fb_' + chNum);
  const pace = document.getElementById('pace_' + chNum);
  const btn = fb.nextElementSibling.nextElementSibling;
  btn.disabled = true; btn.textContent = '重写中...';
  try {
    const body = {
      world: document.getElementById('world').value,
      chars: document.getElementById('chars').value.split('\n').map(s=>s.trim()).filter(Boolean),
      chapter_number: chNum,
      feedback: fb.value || '没有具体反馈, 自行优化',
      pacing: pace.value,
    };
    const res = await fetch('/api/chapter/rewrite', {
      method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.success) {
      const ch = data.chapter;
      const mark = ch.quality_passed ? '<span class="pass">✅</span>' : '<span class="fail">❌</span>';
      const chDiv = btn.closest('.chapter-actions').nextElementSibling;
      chDiv.innerHTML = '<h3>第 ' + ch.number + ' 章 (重写版)</h3>' +
        '<div class="meta">' + ch.word_count + ' 字 | 质量 ' + ch.quality + '/80 ' + mark + '</div>' +
        '<div class="text">' + ch.text + '</div>';
    }
  } catch(e) { alert('重写失败: ' + e.message); }
  btn.disabled = false; btn.textContent = '↻ 重写';
}

// ─── 带进度条的运行 ──────────────────────────────────────
async function runWithProgress() {
  // ... existing validation ...
  const btn = document.getElementById('runBtn');
  const world = document.getElementById('world').value.trim();
  const charsText = document.getElementById('chars').value.trim();
  const chapters = parseInt(document.getElementById('chapters').value);
  const beats = parseInt(document.getElementById('beats').value);
  if (!world) { setStatus('请输入世界观设定', 'error'); return; }
  const chars = charsText.split('\n').map(s => s.trim()).filter(Boolean);
  if (chars.length < 2) { setStatus('至少需要 2 个角色', 'error'); return; }

  btn.disabled = true;
  const pb = document.getElementById('progressBar');
  const pf = document.getElementById('progressFill');
  const pt = document.getElementById('progressText');
  pb.style.display = 'block'; pf.style.width = '0%'; pt.textContent = '开始模拟...';
  document.getElementById('output').innerHTML = '<div class="empty-state">⏳ 生成中...</div>';

  try {
    const res = await fetch('/api/simulate/progress', {
      method: 'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({world, chars, chapters, beats})
    });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream: true});
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          try {
            const data = JSON.parse(line.slice(6));
            if (data.stage === 'running') {
              const pct = Math.round((data.current / data.total) * 100);
              pf.style.width = pct + '%';
              pt.textContent = data.message;
            } else if (data.stage === 'done' && data.result) {
              pf.style.width = '100%';
              pt.textContent = data.message;
              displayChapters(data.result.chapters, data.result.total_words, data.result.quality_scores);
            } else if (data.stage === 'error') {
              setStatus('❌ ' + data.message, 'error');
            }
          } catch(e) {}
        }
      }
    }
    pb.style.display = 'none';
    setStatus('', '');
  } catch(e) {
    setStatus('❌ ' + e.message, 'error');
    pb.style.display = 'none';
  }
  btn.disabled = false;
}

// 修改 run() 按钮改为调用 runWithProgress
function displayChapters(chapters, totalWords, qualityScores) {
  let html = '';
  // 质量条
  let avgQ = Math.round(qualityScores.reduce((a,b)=>a+b,0)/qualityScores.length);
  let qClass = avgQ >= 60 ? 'good' : (avgQ >= 48 ? 'ok' : 'bad');
  html += '<div class="quality-bar"><span class="label">平均质量</span>';
  html += '<div class="track"><div class="fill ' + qClass + '" style="width:' + (avgQ/80*100) + '%"></div></div>';
  html += '<span style="font-size:11px;color:#888;">' + avgQ + '/80</span></div>';
  // 各章
  chapters.forEach(ch => {
    const mark = ch.quality_passed ? '<span class="pass">✅</span>' : '<span class="fail">❌</span>';
    html += '<div class="chapter-actions">';
    html += '<input class="feedback-input" id="fb_' + ch.number + '" placeholder="导演反馈: 冲突不够激烈..." style="flex:1">';
    html += '<select id="pace_' + ch.number + '" class="btn-small"><option value="normal">正常</option><option value="faster">加快</option><option value="slower">放慢</option></select>';
    html += '<button class="btn-small" onclick="rewriteChapter(' + ch.number + ')">&#8635; 重写</button>';
    html += '</div>';
    html += '<div class="chapter">';
    html += '<h3>第 ' + ch.number + ' 章</h3>';
    html += '<div class="meta">' + ch.word_count + ' 字 | 质量 ' + ch.quality + '/80 ' + mark + '</div>';
    html += '<div class="text">' + ch.text + '</div></div>';
  });
  html += '<div style="text-align:center;color:#666;font-size:13px;padding:8px;">共 ' + totalWords + ' 字</div>';
  document.getElementById('output').innerHTML = html;
  drawTensionChart(qualityScores);
}
